name: Route Issues

on:
  issues:
    types: [labeled]

# Note on permissions:
# - Default GITHUB_TOKEN may not have organization permissions to read team members or request reviews.
# - If you get "Not Found" or "Forbidden" errors when querying org teams, you can pass a custom 
#   Personal Access Token (PAT) with "read:org" permissions, or configure a GitHub App token.
# - To use a PAT, change github-token input below to: github-token: ${{ secrets.YOUR_PAT_SECRET }}

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Route issue based on labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ROUTE_ISSUES_PAT || github.token }}
          script: |
            const labelName = context.payload.label.name;
            const label = labelName.toLowerCase();
            const isPullRequest = !!context.payload.issue.pull_request;

            console.log(`Processing label: "${labelName}"`);
            console.log(`Associated with PR? ${isPullRequest}`);

            // Helper function to update project status
            async function updateProjectStatus(targetStatusName) {
              console.log(`Attempting to update project Status field to "${targetStatusName}"...`);
              try {
                const query = `
                  query($nodeId: ID!) {
                    node(id: $nodeId) {
                      ... on Issue {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                              title
                              fields(first: 50) {
                                nodes {
                                  ... on ProjectV2FieldCommon {
                                    id
                                    name
                                    dataType
                                  }
                                  ... on ProjectV2SingleSelectField {
                                    id
                                    name
                                    options {
                                      id
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;

                const variables = { nodeId: context.payload.issue.node_id };
                const result = await github.graphql(query, variables);
                const projectItems = result.node?.projectItems?.nodes || [];

                if (projectItems.length === 0) {
                  console.log('No projects associated with this issue.');
                  return false;
                }

                let updatedCount = 0;
                for (const item of projectItems) {
                  console.log(`Found project: "${item.project.title}" (ID: ${item.project.id})`);
                  
                  // Find single-select Status field
                  const statusField = item.project.fields.nodes.find(
                    f => f.name.toLowerCase() === 'status' && f.options
                  );

                  if (statusField) {
                    const targetOption = statusField.options.find(
                      opt => opt.name.toLowerCase() === targetStatusName.toLowerCase()
                    );

                    if (targetOption) {
                      console.log(`Found option "${targetOption.name}" (ID: ${targetOption.id}) on field "${statusField.name}"`);
                      
                      const mutation = `
                        mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                          updateProjectV2ItemFieldValue(
                            input: {
                              projectId: $projectId
                              itemId: $itemId
                              fieldId: $fieldId
                              value: {
                                singleSelectOptionId: $optionId
                              }
                            }
                          ) {
                            projectV2Item {
                              id
                            }
                          }
                        }
                      `;

                      await github.graphql(mutation, {
                        projectId: item.project.id,
                        itemId: item.id,
                        fieldId: statusField.id,
                        optionId: targetOption.id
                      });
                      console.log(`Successfully updated Status to "${targetOption.name}" on project "${item.project.title}".`);
                      updatedCount++;
                    } else {
                      console.warn(`No option named "${targetStatusName}" found in the Status field for project "${item.project.title}".`);
                    }
                  } else {
                    console.warn(`No single-select field named "Status" found in project "${item.project.title}".`);
                  }
                }
                return updatedCount > 0;
              } catch (error) {
                console.error(`Error updating project field: ${error.message}`);
                return false;
              }
            }

            // 1. Handle "blocked" label
            if (label === 'blocked') {
              const success = await updateProjectStatus('Blocked');
              if (success) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `🚦 Updated Project Status to **Blocked**.`
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `⚠️ Attempted to update Project Status to **Blocked**, but no matching option or project was found.`
                });
              }
            }

            // 2. Handle team roles assignment based on docs/TEAM_ROLES.md (case-insensitive exact names)
            let teamName = null;
            let teamSlug = null;
            let projectStatusName = null;

            if (label === 'adminarchs') {
              teamName = 'AdminArchs (Senior Maintainers & Core Architecture)';
              teamSlug = 'adminarchs';
              projectStatusName = 'AdminArchs';
            } else if (label === 'devops') {
              teamName = 'AdminArchs (Senior Maintainers & Core Architecture)';
              teamSlug = 'adminarchs';
              projectStatusName = 'DevOps';
            } else if (label === 'pythondevs') {
              teamName = 'PythonDevs (Core Engine Developers)';
              teamSlug = 'pythondevs';
              projectStatusName = 'PythonDevs';
            } else if (label === 'aidevs') {
              teamName = 'AIDevs (AI & Machine Learning Integration)';
              teamSlug = 'aidevs';
              projectStatusName = 'AIDevs';
            } else if (label === 'webdevs') {
              teamName = 'WebDevs (Frontend & UI/UX)';
              teamSlug = 'webdevs';
              projectStatusName = 'WebDevs';
            } else if (label === 'extensiondevs') {
              teamName = 'ExtensionDevs (IDE & Browser Integrations)';
              teamSlug = 'extensiondevs';
              projectStatusName = 'ExtensionDevs';
            } else if (label === 'docsexperts') {
              teamName = 'DocsExperts (Technical Writing & DevRel)';
              teamSlug = 'docsexperts';
              projectStatusName = 'DocsExperts';
            } else if (label === 'testers') {
              teamName = 'Testers (QA & Benchmarking)';
              teamSlug = 'testers';
              projectStatusName = 'Testers';
            }

            if (teamSlug) {
              console.log(`Routing to team: "${teamName}" (Slug: ${teamSlug})`);
              
              // Update Project Status field if applicable
              if (projectStatusName) {
                const projectSuccess = await updateProjectStatus(projectStatusName);
                if (projectSuccess) {
                  console.log(`Successfully transitioned project status to "${projectStatusName}"`);
                }
              }

              // Tag the team via comment
              const commentBody = `Assigning to the **${teamName}** team.\nCC: @${context.repo.owner}/${teamSlug}`;
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
                console.log('Successfully posted routing comment.');
              } catch (error) {
                console.error(`Failed to post comment: ${error.message}`);
              }

              // Request review if it's a Pull Request (via issue event payload, if applicable)
              if (isPullRequest) {
                try {
                  await github.rest.pulls.requestReviewers({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    team_reviewers: [teamSlug]
                  });
                  console.log(`Requested review from team: ${teamSlug}`);
                } catch (error) {
                  console.warn(`Could not request team review (non-fatal): ${error.message}`);
                }
              }

              // Attempt to assign the team's members to the issue
              try {
                const membersResponse = await github.rest.teams.listMembersInOrg({
                  org: context.repo.owner,
                  team_slug: teamSlug
                });
                const members = membersResponse.data.map(m => m.login);
                if (members.length > 0) {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    assignees: members
                  });
                  console.log(`Assigned team members: ${members.join(', ')}`);
                } else {
                  console.log('No members found in this team to assign.');
                }
              } catch (error) {
                console.warn(`Could not automatically assign team members (non-fatal): ${error.message}`);
                if (error.status === 404) {
                  console.log(`Team "${teamSlug}" not found in org "${context.repo.owner}". Listing all teams in the organization for troubleshooting...`);
                  try {
                    const teams = await github.rest.teams.list({
                      org: context.repo.owner
                    });
                    const slugs = teams.data.map(t => t.slug);
                    console.log(`Available teams: ${slugs.join(', ') || '(none)'}`);
                  } catch (listError) {
                    console.warn(`Could not list teams in org: ${listError.message}`);
                  }
                }
              }
            }
